services:
  - type: web
    name: jarvis-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: SERP_API_KEY
        sync: false
      - key: GROQ_API_BASE
        sync: false
      - key: GROQ_CHAT_MODEL
        sync: false
      - key: GROQ_CODING_MODEL
        sync: false
      - key: GROQ_COMPOUND_MODEL
        sync: false
      - key: GROQ_CHAT_API_KEY
        sync: false
      - key: GROQ_CODING_API_KEY
        sync: false
      - key: GROQ_COMPOUND_API_KEY
        sync: false
      - key: JARVIS_TIMEZONE
        sync: false
      - key: JARVIS_WEATHER_PROVIDER
        sync: false
      - key: JARVIS_WEATHER_API_BASE
        sync: false
      - key: JARVIS_WEATHER_API_KEY
        sync: false
      - key: DB_PATH
        value: /var/data
